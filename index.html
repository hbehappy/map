<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 장소 검색 서비스</title>
    <style>
        /* CSS: 화면 레이아웃 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* 왼쪽 사이드바 영역 */
        .sidebar {
            width: 380px;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10;
        }

        .search-box {
            padding: 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .search-box input {
            width: 70%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .search-box button {
            width: 25%;
            padding: 10px;
            background: #fae100;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #result-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* 리스트 아이템 스타일 */
        .item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            background: #fff;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .item:hover {
            background: #f1f3f5;
        }

        .item strong {
            color: #333;
            font-size: 1.1rem;
        }

        .item p {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        .item .phone {
            color: #007bff;
            font-size: 0.85rem;
        }

        .item .link {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #888;
            text-decoration: none;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
        }

        /* 이모지 마커 커스텀 오버레이 스타일 */
        .emoji-marker {
            font-size: 30px;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <div id="result-list">
                <!-- 결과가 여기에 동적으로 생성됩니다 -->
            </div>
        </div>
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9a6e86360fe8c7bdd520dfa4085fb18b&libraries=services"></script>

    <script>
        let map;
        let ps; 
        let infowindow;
        let markers = []; // 생성된 마커들을 담을 배열

        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            ps = new kakao.maps.services.Places();
            infowindow = new kakao.maps.InfoWindow({zIndex:1});

            getCurrentLocation();
        });

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    map.setCenter(locPosition);
                    // 현재 위치는 기본 마커로 표시
                    new kakao.maps.Marker({ map: map, position: locPosition });
                });
            }
        }

        // 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.trim()) {
                alert('검색어를 입력하세요!');
                return;
            }
            // 검색 시 기존 마커들 제거
            removeMarkers();
            ps.keywordSearch(keyword, placesSearchCB);
        }

        // 검색 결과 콜백
        function placesSearchCB(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 없습니다.');
            } else {
                alert('오류가 발생했습니다.');
            }
        }

        // 결과 표시 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 1. 이모지 마커 추가 (CustomOverlay 사용)
                const marker = addEmojiMarker(placePosition, places[i]);
                
                // 2. 왼쪽 리스트 아이템 생성
                const itemEl = document.createElement('div');
                itemEl.className = 'item';
                
                // 전화번호가 없을 경우 처리
                const phone = places[i].phone ? places[i].phone : '번호 없음';
                
                itemEl.innerHTML = `
                    <strong>${places[i].place_name}</strong>
                    <p>${places[i].address_name}</p>
                    <p class="phone">📞 ${phone}</p>
                    <a href="${places[i].place_url}" target="_blank" class="link">상세정보/영업시간 보기 ></a>
                `;

                // 리스트 클릭 이벤트
                itemEl.onclick = function() {
                    map.panTo(placePosition);
                    displayInfowindow(placePosition, places[i]);
                };

                listEl.appendChild(itemEl);
                bounds.extend(placePosition);
            }
            map.setBounds(bounds);
        }

        // 이모지 마커(커스텀 오버레이) 생성 함수
        function addEmojiMarker(position, place) {
            const content = document.createElement('div');
            content.className = 'emoji-marker';
            content.innerHTML = '📍'; // 원하는 이모지로 변경 가능

            const customOverlay = new kakao.maps.CustomOverlay({
                position: position,
                content: content,
                map: map
            });

            // 이모지 클릭 시 정보창 표시
            content.onclick = function() {
                displayInfowindow(position, place);
            };

            markers.push(customOverlay); // 배열에 저장하여 나중에 삭제 가능하게 함
            return customOverlay;
        }

        // 기존 마커 전체 삭제 함수
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }

        // 정보창(팝업) 표시 함수
        function displayInfowindow(position, place) {
            const content = `
                <div style="padding:10px; min-width:150px;">
                    <div style="font-weight:bold; margin-bottom:5px;">${place.place_name}</div>
                    <div style="font-size:12px; color:#666;">${place.address_name}</div>
                </div>
            `;
            infowindow.setContent(content);
            infowindow.setPosition(position);
            infowindow.open(map);
        }
    </script>
</body>
</html>
