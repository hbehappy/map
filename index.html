<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 장소 검색 서비스</title>
    <style>
        /* CSS: 화면 레이아웃 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
        }

        .container {
            display: flex; /* 왼쪽과 오른쪽으로 분할 */
            height: 100vh;
        }

        /* 왼쪽 검색창 및 결과 리스트 영역 */
        .sidebar {
            width: 350px;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 10;
        }

        .search-box {
            padding: 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .search-box input {
            width: 70%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .search-box button {
            width: 25%;
            padding: 10px;
            background: #fae100; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #result-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .item:hover {
            background: #e9ecef;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1; /* 남은 공간을 모두 차지 */
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽: 검색 및 리스트 -->
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <div id="result-list">
                <!-- 검색 결과가 여기에 추가됩니다 -->
            </div>
        </div>

        <!-- 오른쪽: 지도 표시 -->
        <div id="map"></div>
    </div>

    <!-- 카카오맵 SDK 로드 (libraries=services 는 장소 검색 기능을 위해 필요합니다) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9a6e86360fe8c7bdd520dfa4085fb18b&libraries=services"></script>

    <script>
        // 전역 변수 설정
        let map;
        let ps; // 장소 검색 객체
        let infowindow; // 정보창 객체

        // 지도가 로드된 후 실행되도록 kakao.maps.load 사용
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567), // 기본 위치(서울시청)
                level: 5 // 확대 레벨 5
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 서비스 객체 생성
            ps = new kakao.maps.services.Places();
            
            // 마우스 오버 시 표시할 정보창 생성
            infowindow = new kakao.maps.InfoWindow({zIndex:1});

            // 현재 위치 권한 요청 및 지도 중심 이동
            getCurrentLocation();
        });

        // 사용자의 현재 위치를 가져오는 함수
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);

                    // 지도 중심을 현재 위치로 변경
                    map.setCenter(locPosition);
                    
                    // 현재 위치에 마커 표시
                    new kakao.maps.Marker({
                        map: map,
                        position: locPosition
                    });
                }, function(error) {
                    console.error("위치 권한을 거부했거나 오류가 발생했습니다.");
                });
            }
        }

        // 키워드 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;

            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('키워드를 입력해주세요!');
                return;
            }

            // 카카오 장소 검색 API 호출
            ps.keywordSearch(keyword, placesSearchCB);
        }

        // 장소 검색 결과 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 없습니다.');
            } else {
                alert('검색 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과를 화면에 표시하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            
            // 이전 결과 삭제
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                const marker = addMarker(placePosition);
                const itemEl = document.createElement('div');
                
                itemEl.className = 'item';
                itemEl.innerHTML = `<strong>${places[i].place_name}</strong><br><small>${places[i].address_name}</small>`;

                // 리스트 아이템 클릭 시 지도 이동 및 정보창 표시
                itemEl.onclick = function() {
                    map.panTo(placePosition);
                    displayInfowindow(marker, places[i].place_name);
                };

                listEl.appendChild(itemEl);
                bounds.extend(placePosition);
            }

            // 검색된 장소들이 다 보이도록 지도 범위 조절
            map.setBounds(bounds);
        }

        // 마커 생성 함수
        function addMarker(position) {
            const marker = new kakao.maps.Marker({
                position: position,
                map: map
            });
            return marker;
        }

        // 정보창 표시 함수
        function displayInfowindow(marker, title) {
            const content = `<div style="padding:5px;z-index:1;">${title}</div>`;
            infowindow.setContent(content);
            infowindow.open(map, marker);
        }
    </script>
</body>
</html>
