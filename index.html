<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조선팔도 주막 찾기</title>
    <!-- 나눔명조 폰트 (조선시대 느낌) -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wood: #5D4037;
            --paper: #F9F4E8;
            --ink: #212121;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nanum Myeongjo', serif;
        }

        body, html {
            height: 100%;
            background-color: var(--paper);
            color: var(--ink);
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 10px;
            gap: 10px;
        }

        /* 왼쪽 사이드바 (서책 테마) */
        .sidebar {
            width: 380px;
            background: white;
            border: 4px double var(--wood);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 2px dashed var(--wood);
            background-color: #fdfaf1;
        }

        /* 요청하신 캐릭터 이미지 */
        .character {
            width: 140px;
            margin-bottom: 10px;
        }

        .header h2 {
            font-size: 1.3rem;
            color: var(--wood);
            margin-bottom: 15px;
        }

        .search-wrap {
            display: flex;
            border: 2px solid var(--wood);
            border-radius: 5px;
            padding: 5px;
            background: white;
        }

        .search-wrap input {
            flex: 1;
            border: none;
            outline: none;
            padding: 8px;
            font-size: 0.9rem;
            background: transparent;
        }

        .search-wrap button {
            background: var(--wood);
            color: white;
            border: none;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }

        #result-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
        }

        .item {
            padding: 15px;
            border-bottom: 1px dashed var(--wood);
            cursor: pointer;
            transition: 0.2s;
        }

        .item:hover {
            background: rgba(93, 64, 55, 0.05);
        }

        .item strong {
            color: #d32f2f;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .item p {
            font-size: 0.85rem;
            color: #666;
        }

        /* 오른쪽 지도 (병풍 테두리) */
        #map {
            flex: 1;
            border: 8px solid var(--wood);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* 마커 스타일 */
        .emoji-marker {
            font-size: 35px;
            cursor: pointer;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="header">
                <!-- 이미지 삽입 -->
                <img src="data:image/png;base64," class="character">
                <h2>어디로 가고싶으세요 마님?</h2>
                <div class="search-wrap">
                    <input type="text" id="keyword" placeholder="장소 이름을 입력하시오" onkeypress="if(event.keyCode==13) searchPlaces()">
                    <button onclick="searchPlaces()">찾기</button>
                </div>
            </div>
            <div id="result-list"></div>
        </div>
        <div id="map"></div>
    </div>

    <!-- 카카오맵 SDK -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9a6e86360fe8c7bdd520dfa4085fb18b&libraries=services"></script>

    <script>
        let map;
        let ps;
        let infowindow;
        let markers = [];

        // 1. 지도 초기화 (SDK 로드 후 실행)
        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            ps = new kakao.maps.services.Places();
            infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

            // 2. 현재 위치 권한 허용 및 중심 이동
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const moveLatLon = new kakao.maps.LatLng(lat, lon);
                    map.setCenter(moveLatLon);
                    
                    // 현재 위치 표시
                    addMarker(moveLatLon, "나의 현재 위치", "🏯");
                }, function(err) {
                    console.error("위치 정보를 가져올 수 없소.");
                });
            }
        });

        // 장소 검색 함수
        function searchPlaces() {
            const val = document.getElementById('keyword').value;
            if (!val.trim()) {
                alert('어디를 찾으시는지 적어주시게!');
                return;
            }
            
            removeMarkers();
            ps.keywordSearch(val, function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    displayResults(data);
                } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                    alert('그곳은 찾을 수 없사옵니다.');
                }
            });
        }

        // 검색 결과 표시
        function displayResults(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const pos = new kakao.maps.LatLng(places[i].y, places[i].x);
                addMarker(pos, places[i].place_name, "📍");

                const itemEl = document.createElement('div');
                itemEl.className = 'item';
                itemEl.innerHTML = '<strong>' + places[i].place_name + '</strong><p>' + places[i].address_name + '</p>';
                
                itemEl.onclick = function() {
                    map.panTo(pos);
                    infowindow.setContent('<div style="padding:10px; border:2px solid var(--wood); border-radius:5px;">' + places[i].place_name + '</div>');
                    infowindow.setPosition(pos);
                    infowindow.open(map);
                };

                listEl.appendChild(itemEl);
                bounds.extend(pos);
            }
            map.setBounds(bounds);
        }

        // 이모지 마커 추가
        function addMarker(pos, title, emoji) {
            const content = document.createElement('div');
            content.className = 'emoji-marker';
            content.innerHTML = emoji;
            
            const marker = new kakao.maps.CustomOverlay({
                position: pos,
                content: content,
                map: map
            });

            content.onclick = function() {
                infowindow.setContent('<div style="padding:10px; border:2px solid var(--wood); border-radius:5px;">' + title + '</div>');
                infowindow.setPosition(pos);
                infowindow.open(map);
            };

            markers.push(marker);
        }

        // 기존 마커 제거
        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) markers[i].setMap(null);
            markers = [];
        }
    </script>
</body>
</html>
