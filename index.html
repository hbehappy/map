<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 몽글몽글 장소 찾기 🌟</title>
    <!-- 구글 폰트에서 부드러운 글씨체 가져오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Nanum+Gothic+Coding&family=Nanum+Square+Round:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS: 귀여운 테마 설정 */
        :root {
            --main-color: #FFDE59;     /* 카카오 느낌의 귀여운 노랑 */
            --point-color: #FF914D;    /* 따뜻한 주황색 포인트 */
            --bg-color: #FFFBEB;       /* 아주 연한 노란색 배경 */
            --text-dark: #4A4A4A;      /* 진한 회색 (검정보다 부드러움) */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 전체 글씨체를 부드러운 라운드체로 설정 */
            font-family: 'NanumSquareRound', 'Malgun Gothic', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-dark);
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 10px; /* 화면 끝에 여백을 줘서 둥근 느낌 강조 */
            gap: 10px;
        }

        /* 왼쪽 사이드바 (리스트 영역) */
        .sidebar {
            width: 380px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 20px; /* 모서리를 아주 둥글게 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .search-box {
            padding: 25px 20px;
            background: white;
            border-bottom: 2px dashed var(--main-color); /* 구분선을 점선으로 */
        }

        .search-box h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--point-color);
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #EEE;
            border-radius: 12px;
            outline: none;
            transition: border 0.3s;
        }

        .search-box input:focus {
            border: 2px solid var(--main-color);
        }

        .search-box button {
            padding: 0 15px;
            background: var(--main-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .search-box button:hover {
            background: #f7d32d;
            transform: scale(1.05); /* 버튼이 살짝 커지는 효과 */
        }

        #result-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* 리스트 아이템 디자인 */
        .item {
            padding: 18px;
            border-radius: 15px;
            background: #FFF;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #F0F0F0;
            transition: all 0.2s ease;
        }

        .item:hover {
            background: #FFF9E1;
            border-color: var(--main-color);
            transform: translateY(-3px); /* 위로 살짝 뜨는 효과 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .item strong {
            display: block;
            font-size: 1.1rem;
            color: #222;
            margin-bottom: 5px;
        }

        .item p {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 4px;
        }

        .item .phone {
            color: var(--point-color);
            font-weight: bold;
        }

        .item .link {
            font-size: 0.75rem;
            color: #BBB;
            text-decoration: none;
            display: inline-block;
            margin-top: 5px;
        }

        /* 오른쪽 지도 영역 */
        #map {
            flex: 1;
            height: 100%;
            border-radius: 20px; /* 지도의 모서리도 둥글게 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        /* 마커 이모지 스타일 */
        .emoji-marker {
            font-size: 35px;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
            animation: bounce 0.8s infinite alternate; /* 통통 튀는 애니메이션 */
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        /* 팝업 인포윈도우 커스텀 */
        .custom-info {
            padding: 10px;
            background: white;
            border-radius: 12px;
            border: 2px solid var(--main-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 왼쪽 사이드바 -->
        <div class="sidebar">
            <div class="search-box">
                <h2>🌈 어디로 갈까요?</h2>
                <div class="input-group">
                    <input type="text" id="keyword" placeholder="궁금한 장소를 입력해봐요!" onkeypress="if(event.keyCode==13) searchPlaces()">
                    <button onclick="searchPlaces()">🔍</button>
                </div>
            </div>
            <div id="result-list">
                <!-- 검색 결과가 여기에 숑숑 나타나요 -->
            </div>
        </div>

        <!-- 오른쪽 지도 -->
        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9a6e86360fe8c7bdd520dfa4085fb18b&libraries=services"></script>

    <script>
        let map;
        let ps; 
        let infowindow;
        let markers = [];

        kakao.maps.load(function() {
            const mapContainer = document.getElementById('map'); 
            const mapOptions = {
                center: new kakao.maps.LatLng(37.566826, 126.9786567),
                level: 5
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            ps = new kakao.maps.services.Places();
            // 정보창도 둥글게 보이기 위해 테두리 제거 등 설정
            infowindow = new kakao.maps.InfoWindow({zIndex:1, removable: true});

            getCurrentLocation();
        });

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const locPosition = new kakao.maps.LatLng(position.coords.latitude, position.coords.longitude);
                    map.setCenter(locPosition);
                    // 내 위치는 귀여운 별로 표시해볼까요?
                    addEmojiMarker(locPosition, {place_name: "내 위치!"}, '⭐');
                });
            }
        }

        function searchPlaces() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword.trim()) {
                alert('검색어를 입력해달라곰! 🐻');
                return;
            }
            removeMarkers();
            ps.keywordSearch(keyword, placesSearchCB);
        }

        function placesSearchCB(data, status) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('앗, 검색 결과가 없어요.. 😢');
            } else {
                alert('뭔가 오류가 났어요! 다시 시도해봐요.');
            }
        }

        function displayPlaces(places) {
            const listEl = document.getElementById('result-list');
            const bounds = new kakao.maps.LatLngBounds();
            listEl.innerHTML = '';

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 장소 검색 결과는 핀(📍) 이모지로 표시
                addEmojiMarker(placePosition, places[i], '📍');
                
                const itemEl = document.createElement('div');
                itemEl.className = 'item';
                const phone = places[i].phone ? places[i].phone : '번호가 없어요';
                
                itemEl.innerHTML = `
                    <strong>${places[i].place_name}</strong>
                    <p>📍 ${places[i].address_name}</p>
                    <p class="phone">📞 ${phone}</p>
                    <a href="${places[i].place_url}" target="_blank" class="link">상세페이지 구경가기 ➔</a>
                `;

                itemEl.onclick = function() {
                    map.panTo(placePosition);
                    displayInfowindow(placePosition, places[i]);
                };

                listEl.appendChild(itemEl);
                bounds.extend(placePosition);
            }
            map.setBounds(bounds);
        }

        // 이모지 마커 생성 (아이콘 모양을 매개변수로 받게 수정)
        function addEmojiMarker(position, place, emoji) {
            const content = document.createElement('div');
            content.className = 'emoji-marker';
            content.innerHTML = emoji;

            const customOverlay = new kakao.maps.CustomOverlay({
                position: position,
                content: content,
                map: map
            });

            content.onclick = function() {
                displayInfowindow(position, place);
            };

            markers.push(customOverlay);
            return customOverlay;
        }

        function removeMarkers() {
            for (let i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }

        function displayInfowindow(position, place) {
            const content = `
                <div style="padding:15px; line-height:1.6; border-radius:15px;">
                    <div style="font-weight:bold; color:#FF914D; font-size:16px;">${place.place_name}</div>
                    <div style="font-size:12px; color:#999;">${place.address_name}</div>
                </div>
            `;
            infowindow.setContent(content);
            infowindow.setPosition(position);
            infowindow.open(map);
        }
    </script>
</body>
</html>
